name: dashboard

services:
  api:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}
      DATABASE_URL: sqlite:////data/dashboard.db
    volumes:
      - dashboard_data:/data

  web:
    build: ./frontend
    ports:
      - "8080:80"
    expose:
      - "80"
    depends_on:
      - api

  # На ВМ: COMPOSE_PROFILES=with-https docker compose up -d --build (см. scripts/deploy.sh)
  caddy:
    profiles: ["with-https"]
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  dashboard_data:
  caddy_data:
  caddy_config:
